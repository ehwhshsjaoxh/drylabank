<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRYLABANK - Премиум банк</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;transition:background 0.3s, color 0.3s}
        
        /* ТЁМНАЯ ТЕМА */
        body{background:linear-gradient(135deg,#1a2a6c,#b21f1f,#fdbb4d);min-height:100vh;padding:20px}
        body.dark{background:linear-gradient(135deg,#0a0a1a,#1a0a0a,#2a1a0a)}
        body.dark .card{background:#1e1e2e;color:#eee}
        body.dark .card h1, body.dark .card h3, body.dark .card .subtitle{color:#eee}
        body.dark .online-list{background:#2a2a3e}
        body.dark .level-card{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#333}
        body.dark .cashback-info, body.dark .cleanup-info{background:#2a2a3e;color:#ddd}
        body.dark input, body.dark select, body.dark textarea{background:#2a2a3e;border-color:#444;color:#eee}
        body.dark .notification-item{background:#2a2a3e}
        body.dark .message-item{background:#2a2a3e}
        body.dark table th{background:#2a2a3e}
        body.dark table td{border-bottom-color:#444}
        body.dark .favorite-contact{background:#2a2a3e}
        body.dark .goal-item{background:#2a2a3e}
        body.dark .credit-item{background:#2a2a3e}
        body.dark .nft-card{background:#2a2a3e;border-color:#444}
        
        .container{max-width:1000px;margin:0 auto}
        .card{background:white;border-radius:24px;padding:25px;margin-bottom:20px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
        h1{color:#b21f1f;margin-bottom:8px}
        h3{margin:20px 0 10px;color:#333}
        input,select,textarea{width:100%;padding:12px;margin-bottom:15px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px}
        button{background:#b21f1f;color:white;border:none;padding:12px 20px;border-radius:12px;font-size:16px;cursor:pointer;font-weight:bold;transition:0.2s}
        button:hover{background:#8b1a1a;transform:translateY(-2px)}
        .error{background:#fee;color:#c00;padding:12px;border-radius:12px;margin-bottom:15px}
        .success{background:#e8f5e9;color:#2e7d32;padding:12px;border-radius:12px;margin-bottom:15px}
        .balance-card{background:linear-gradient(135deg,#1a2a6c,#b21f1f);color:white;padding:20px;border-radius:20px;margin:15px 0}
        .flex-row{display:flex;gap:10px;flex-wrap:wrap}
        .online-list{background:#f0f2f5;border-radius:16px;padding:15px;margin:15px 0}
        .online-user{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #ddd}
        .status-dot{width:10px;height:10px;background:#2ecc71;border-radius:50%;display:inline-block;margin-right:10px;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        .toast{position:fixed;bottom:20px;right:20px;background:#1a2a6c;color:white;padding:12px 20px;border-radius:12px;z-index:9999;animation:slideIn 0.3s}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .logo{font-size:24px;font-weight:bold;background:linear-gradient(135deg,#1a2a6c,#b21f1f);-webkit-background-clip:text;background-clip:text;color:transparent}
        .online-badge{background:#2ecc71;color:white;padding:4px 12px;border-radius:20px;font-size:12px;margin-left:10px;display:inline-block}
        .moderator-badge{background:#ff9800;color:white;padding:4px 12px;border-radius:20px;font-size:12px;margin-left:10px;display:inline-block}
        .admin-badge{background:#b21f1f;color:white;padding:4px 12px;border-radius:20px;font-size:12px;margin-left:10px;display:inline-block}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #eee}
        th{background:#f5f5f5}
        .role-select{width:auto;display:inline-block;margin:0;padding:6px}
        .message-item{padding:12px;border-bottom:1px solid #eee;background:#f9f9f9;margin-bottom:8px;border-radius:8px}
        .ticket-response{background:#e3f2fd;padding:8px;border-radius:8px;margin-top:8px;font-size:13px}
        .cleanup-info{background:#e8f5e9;padding:10px;border-radius:12px;margin-bottom:15px;font-size:13px;color:#2e7d32}
        .level-card{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#333;padding:15px;border-radius:16px;margin:15px 0;text-align:center}
        .cashback-info{background:#e3f2fd;padding:10px;border-radius:12px;margin:10px 0;font-size:14px}
        .daily-bonus{background:#ff9800;color:white;padding:12px;border-radius:12px;text-align:center;cursor:pointer}
        .favorite-contact{background:#f0f2f5;padding:8px;border-radius:12px;display:inline-block;margin:5px;cursor:pointer}
        .notification-item{background:#f9f9f9;padding:12px;border-radius:12px;margin-bottom:10px;border-left:4px solid #b21f1f;display:flex;justify-content:space-between;align-items:center}
        .delete-notif{background:#dc3545;color:white;border:none;padding:5px 10px;border-radius:8px;cursor:pointer}
        .tab{display:inline-block;padding:10px 20px;cursor:pointer;margin-right:10px;background:#b21f1f;color:white;border-radius:12px;border:none;font-weight:bold}
        .tab:hover{background:#8b1a1a}
        .tab.active{background:#8b1a1a;box-shadow:inset 0 2px 4px rgba(0,0,0,0.2)}
        .market-link{background:#4ecdc4;color:white;padding:8px 15px;border-radius:12px;text-decoration:none;display:inline-block}
        .market-link:hover{background:#3ba89f}
        .theme-toggle{background:#333;color:white;padding:8px 12px;border-radius:20px;font-size:12px;margin-right:10px;border:none;cursor:pointer}
        
        /* NFT */
        .nft-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-top:15px}
        .nft-card{background:#f9f9f9;border-radius:16px;padding:15px;text-align:center;border:2px solid #eee;transition:0.2s}
        .nft-card:hover{transform:translateY(-3px);box-shadow:0 5px 15px rgba(0,0,0,0.1)}
        .nft-card .nft-icon{font-size:48px;margin-bottom:10px}
        .nft-card .nft-name{font-weight:bold}
        .nft-card .nft-rarity{font-size:11px;color:#666;margin:5px 0}
        .nft-price{font-size:16px;color:#b21f1f;font-weight:bold}
        .owned-badge{background:#2e7d32;color:white;padding:4px 8px;border-radius:12px;font-size:11px;display:inline-block}
        
        /* Цели */
        .goal-item{background:#f9f9f9;border-radius:16px;padding:15px;margin-bottom:10px;border-left:4px solid #b21f1f}
        .goal-progress{height:10px;background:#e0e0e0;border-radius:10px;margin:10px 0;overflow:hidden}
        .goal-progress-fill{height:100%;background:#b21f1f;border-radius:10px;transition:width 0.3s}
        
        /* Кредиты */
        .credit-item{background:#e8f5e9;border-radius:16px;padding:15px;margin-bottom:10px;border-left:4px solid #2e7d32}
        
        /* Карта */
        .virtual-card{background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;padding:20px;border-radius:20px;margin:15px 0}
        .virtual-card .card-number{font-size:22px;letter-spacing:3px;margin:15px 0;font-family:monospace}
        .virtual-card .card-bottom{display:flex;justify-content:space-between;margin-top:15px}
        
        @media (max-width:768px){
            .container{max-width:100%}
            .card{padding:15px}
            button{padding:10px}
            .nft-grid{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
<div class="container" id="app">🔄 Загрузка...</div>

<script>
    // ========== КОНФИГ FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBkcX3Mpu5FvOVKzwkwTuEZKR4GzfUZzlg",
        authDomain: "drylabank.firebaseapp.com",
        projectId: "drylabank",
        storageBucket: "drylabank.firebasestorage.app",
        messagingSenderId: "696343144710",
        appId: "1:696343144710:web:60c3c004805c110f459687"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let currentUserData = null;
    let currentTab = 'main';
    let isDarkTheme = localStorage.getItem('drylabank_theme') === 'dark';
    let catalogNFT = [];
    let myNFTs = [];

    // ========== ТЁМНАЯ ТЕМА ==========
    function applyTheme() {
        if (isDarkTheme) document.body.classList.add('dark');
        else document.body.classList.remove('dark');
    }
    function toggleTheme() {
        isDarkTheme = !isDarkTheme;
        localStorage.setItem('drylabank_theme', isDarkTheme ? 'dark' : 'light');
        applyTheme();
        render();
        showToast(isDarkTheme ? '🌙 Тёмная тема' : '☀️ Светлая тема');
    }

    // ========== БАЗОВЫЙ КАТАЛОГ NFT ==========
    const DEFAULT_NFT_CATALOG = [
        { id: "nft1", name: "🔥 Пламенный Дракон", icon: "🐉", price: 5000, rarity: "legendary", creator: "system" },
        { id: "nft2", name: "💎 Кристальный Меч", icon: "⚔️", price: 3000, rarity: "epic", creator: "system" },
        { id: "nft3", name: "👑 Корона Власти", icon: "👑", price: 8000, rarity: "legendary", creator: "system" },
        { id: "nft4", name: "🛡️ Щит Героя", icon: "🛡️", price: 2500, rarity: "rare", creator: "system" },
        { id: "nft5", name: "📜 Древний Свиток", icon: "📜", price: 1500, rarity: "common", creator: "system" }
    ];

    // ========== ЗАГРУЗКА КАТАЛОГА NFT ==========
    async function loadNFTCatalog() {
        const snap = await db.ref('nft_catalog').once('value');
        if (snap.exists()) {
            catalogNFT = Object.values(snap.val());
        } else {
            catalogNFT = DEFAULT_NFT_CATALOG;
            const catalogObj = {};
            DEFAULT_NFT_CATALOG.forEach(nft => { catalogObj[nft.id] = nft; });
            await db.ref('nft_catalog').set(catalogObj);
        }
        return catalogNFT;
    }

    // ========== ЗАГРУЗКА NFT ПОЛЬЗОВАТЕЛЯ ==========
    async function loadUserNFTs() {
        const snap = await db.ref('nfts/' + currentUser).once('value');
        myNFTs = snap.val() || [];
        return myNFTs;
    }

    // ========== ПОКУПКА NFT ==========
    async function buyNFT(nftId, price) {
        if (currentUserData.balance < price) {
            showToast('❌ Недостаточно средств!', true);
            return false;
        }
        if (myNFTs.includes(nftId)) {
            showToast('❌ У вас уже есть этот NFT!', true);
            return false;
        }
        const newBalance = currentUserData.balance - price;
        myNFTs.push(nftId);
        await db.ref('users/' + currentUser).update({ balance: newBalance });
        await db.ref('nfts/' + currentUser).set(myNFTs);
        currentUserData.balance = newBalance;
        await addNotification(currentUser, 'nft_buy', 'Покупка NFT', `Вы купили NFT "${catalogNFT.find(n => n.id === nftId)?.name}" за ${price.toLocaleString()} ₽`);
        showToast(`✅ NFT куплен!`);
        render();
        return true;
    }

    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function saveSession(login) {
        if (login) localStorage.setItem('drylabank_session', login);
        else localStorage.removeItem('drylabank_session');
    }

    function restoreSession() {
        const saved = localStorage.getItem('drylabank_session');
        if (saved) currentUser = saved;
    }

    async function updateOnline() {
        if (!currentUser || !currentUserData) return;
        await db.ref('online/' + currentUser).set({
            name: currentUserData.name || currentUser,
            role: currentUserData.role || 'user',
            lastSeen: Date.now()
        });
    }

    async function getOnlineUsers() {
        const snap = await db.ref('online').once('value');
        const data = snap.val() || {};
        const now = Date.now();
        const users = [];
        for (let login in data) {
            if (now - data[login].lastSeen < 30000 && login !== currentUser) {
                users.push({ login, name: data[login].name, role: data[login].role });
            }
        }
        return users;
    }

    // ========== УВЕДОМЛЕНИЯ ==========
    async function addNotification(login, type, title, message) {
        const notification = {
            id: Date.now(),
            type: type,
            title: title,
            message: message,
            date: new Date().toLocaleString(),
            timestamp: Date.now(),
            read: false
        };
        const userNotifsRef = db.ref('notifications/' + login);
        const snap = await userNotifsRef.once('value');
        let notifs = snap.val() || [];
        notifs.unshift(notification);
        if (notifs.length > 200) notifs.pop();
        await userNotifsRef.set(notifs);
        if (login === currentUser) render();
    }

    async function addHistoryEvent(type, title, message) {
        await addNotification(currentUser, type, title, message);
    }

    async function getUserNotifications() {
        const snap = await db.ref('notifications/' + currentUser).once('value');
        let notifs = snap.val() || [];
        notifs.sort((a,b) => b.timestamp - a.timestamp);
        return notifs;
    }

    async function deleteNotification(notifId) {
        const snap = await db.ref('notifications/' + currentUser).once('value');
        let notifs = snap.val() || [];
        notifs = notifs.filter(n => n.id != notifId);
        await db.ref('notifications/' + currentUser).set(notifs);
        render();
    }

    async function deleteAllNotifications() {
        await db.ref('notifications/' + currentUser).set([]);
        render();
        showToast('Все уведомления удалены');
    }

    async function markNotificationRead(notifId) {
        const snap = await db.ref('notifications/' + currentUser).once('value');
        let notifs = snap.val() || [];
        const index = notifs.findIndex(n => n.id == notifId);
        if (index !== -1) {
            notifs[index].read = true;
            await db.ref('notifications/' + currentUser).set(notifs);
            render();
        }
    }

    // ========== РАСЧЁТ УРОВНЯ ==========
    function calculateLevel(balance) {
        if (balance >= 100000) return { name: 'Gold', cashback: 3, color: '#ffd700' };
        if (balance >= 50000) return { name: 'Silver', cashback: 2, color: '#c0c0c0' };
        return { name: 'Bronze', cashback: 1, color: '#cd7f32' };
    }

    // ========== ЕЖЕДНЕВНЫЙ БОНУС ==========
    async function claimDailyBonus() {
        const lastBonus = currentUserData.lastBonus || 0;
        const today = new Date().toDateString();
        if (lastBonus !== today) {
            const bonus = 100;
            currentUserData.balance += bonus;
            currentUserData.lastBonus = today;
            await db.ref('users/' + currentUser).update({
                balance: currentUserData.balance,
                lastBonus: today
            });
            await addHistoryEvent('bonus', 'Ежедневный бонус', `Вы получили ${bonus} ₽ за сегодняшний вход!`);
            showToast(`🎉 Получен ежедневный бонус ${bonus} ₽!`);
            render();
            return true;
        }
        return false;
    }

    // ========== ЦЕЛИ ==========
    async function createGoal(name, targetAmount) {
        const goals = currentUserData.goals || [];
        goals.push({
            id: Date.now(),
            name: name,
            target: targetAmount,
            current: 0,
            createdAt: new Date().toLocaleString()
        });
        await db.ref('users/' + currentUser).update({ goals: goals });
        currentUserData.goals = goals;
        render();
        showToast(`✅ Цель "${name}" создана!`);
    }
    
    async function addToGoal(goalId, amount) {
        const goals = currentUserData.goals || [];
        const goal = goals.find(g => g.id == goalId);
        if (!goal) return;
        if (currentUserData.balance < amount) {
            showToast('❌ Недостаточно средств', true);
            return;
        }
        currentUserData.balance -= amount;
        goal.current += amount;
        await db.ref('users/' + currentUser).update({ 
            balance: currentUserData.balance,
            goals: goals 
        });
        await addHistoryEvent('goal', 'Пополнение цели', `Вы добавили ${amount.toLocaleString()} ₽ к цели "${goal.name}"`);
        render();
        showToast(`✅ Добавлено ${amount.toLocaleString()} ₽ к цели "${goal.name}"`);
    }
    
    async function deleteGoal(goalId) {
        let goals = currentUserData.goals || [];
        goals = goals.filter(g => g.id != goalId);
        await db.ref('users/' + currentUser).update({ goals: goals });
        currentUserData.goals = goals;
        render();
    }

    // ========== ВИРТУАЛЬНАЯ КАРТА ==========
    async function createVirtualCard() {
        if (currentUserData.card) {
            showToast('У вас уже есть карта', true);
            return;
        }
        const cardNumber = '**** ' + Math.floor(Math.random()*10000).toString().padStart(4,'0') + ' ' +
                          Math.floor(Math.random()*10000).toString().padStart(4,'0') + ' ' +
                          Math.floor(Math.random()*10000).toString().padStart(4,'0');
        const expiry = `${(Math.floor(Math.random()*12)+1).toString().padStart(2,'0')}/${new Date().getFullYear()+3}`;
        const cvv = Math.floor(Math.random()*900+100);
        const card = { number: cardNumber, expiry: expiry, cvv: cvv, type: 'standard' };
        await db.ref('users/' + currentUser).update({ card: card });
        currentUserData.card = card;
        await addHistoryEvent('card', 'Создание карты', `Вы создали виртуальную карту ${cardNumber.slice(-4)}`);
        render();
        showToast('💳 Виртуальная карта создана!');
    }

    // ========== КРЕДИТЫ ==========
    async function takeLoan(amount, months) {
        if (currentUserData.activeLoan) {
            showToast('❌ У вас уже есть активный кредит! Погасите его сначала.', true);
            return;
        }
        const interest = 0.15;
        const monthlyPayment = Math.ceil(amount * (1 + interest) / months);
        currentUserData.balance += amount;
        const loan = {
            id: Date.now(),
            amount: amount,
            months: months,
            monthlyPayment: monthlyPayment,
            remaining: months,
            takenAt: new Date().toLocaleString()
        };
        await db.ref('users/' + currentUser).update({ 
            balance: currentUserData.balance,
            activeLoan: loan 
        });
        currentUserData.activeLoan = loan;
        await addHistoryEvent('loan', 'Взятие кредита', `Вы взяли кредит ${amount.toLocaleString()} ₽ на ${months} месяцев`);
        showToast(`✅ Кредит ${amount.toLocaleString()} ₽ одобрен!`);
        render();
    }
    
    async function repayLoan() {
        const loan = currentUserData.activeLoan;
        if (!loan) {
            showToast('❌ Нет активного кредита', true);
            return;
        }
        if (currentUserData.balance < loan.monthlyPayment) {
            showToast(`❌ Недостаточно средств для платежа ${loan.monthlyPayment.toLocaleString()} ₽`, true);
            return;
        }
        currentUserData.balance -= loan.monthlyPayment;
        loan.remaining--;
        if (loan.remaining <= 0) {
            await db.ref('users/' + currentUser).update({ 
                balance: currentUserData.balance,
                activeLoan: null 
            });
            currentUserData.activeLoan = null;
            await addHistoryEvent('loan', 'Кредит погашен', `Вы полностью погасили кредит!`);
            showToast('🎉 Кредит полностью погашен!');
        } else {
            await db.ref('users/' + currentUser).update({ 
                balance: currentUserData.balance,
                activeLoan: loan 
            });
            await addHistoryEvent('loan', 'Платёж по кредиту', `Вы внесли платёж ${loan.monthlyPayment.toLocaleString()} ₽`);
            showToast(`✅ Внесён платёж. Осталось ${loan.remaining} платежей.`);
        }
        render();
    }

    // ========== АВТООЧИСТКА ==========
    const HISTORY_DAYS = 7;
    async function cleanupOldData() {
        const cutoffTime = Date.now() - (HISTORY_DAYS * 24 * 60 * 60 * 1000);
        const ticketsSnap = await db.ref('tickets').once('value');
        const tickets = ticketsSnap.val() || {};
        for (let ticketId in tickets) {
            const ticket = tickets[ticketId];
            if (ticket.status !== 'open' && ticket.resolvedAtTimestamp && ticket.resolvedAtTimestamp < cutoffTime) {
                await db.ref('tickets/' + ticketId).remove();
            }
        }
        const usersSnap = await db.ref('users').once('value');
        const users = usersSnap.val() || {};
        for (let login in users) {
            const notifsSnap = await db.ref('notifications/' + login).once('value');
            let notifs = notifsSnap.val() || [];
            const newNotifs = notifs.filter(n => n.timestamp > cutoffTime);
            if (newNotifs.length !== notifs.length) {
                await db.ref('notifications/' + login).set(newNotifs);
            }
        }
    }

    function scheduleCleanup() {
        cleanupOldData();
        setInterval(cleanupOldData, 24 * 60 * 60 * 1000);
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    async function initDB() {
        const snapshot = await db.ref('users').once('value');
        if (!snapshot.exists()) {
            await db.ref('users').set({
                "dryla(adm)": {
                    login: "dryla(adm)",
                    password: "qwertyuiop",
                    name: "Администратор",
                    balance: 999999,
                    role: "admin",
                    favorites: [],
                    lastBonus: null,
                    goals: [],
                    card: null,
                    activeLoan: null
                },
                "test": {
                    login: "test",
                    password: "123",
                    name: "Тестовый",
                    balance: 50000,
                    role: "user",
                    favorites: [],
                    lastBonus: null,
                    goals: [],
                    card: null,
                    activeLoan: null
                }
            });
        }
        const ticketsSnap = await db.ref('tickets').once('value');
        if (!ticketsSnap.exists()) {
            await db.ref('tickets').set({});
        }
        await loadNFTCatalog();
    }

    // ========== ЖАЛОБЫ ==========
    async function sendTicket(topic, text) {
        const ticketsRef = db.ref('tickets');
        const newTicketRef = ticketsRef.push();
        await newTicketRef.set({
            id: newTicketRef.key,
            from: currentUser,
            fromName: currentUserData.name,
            topic: topic,
            text: text,
            status: 'open',
            date: new Date().toLocaleString(),
            createdAt: Date.now(),
            response: null,
            resolved: false
        });
        await addHistoryEvent('complaint_sent', 'Жалоба отправлена', `Вы отправили жалобу: "${topic}"`);
        const usersSnap = await db.ref('users').once('value');
        const users = usersSnap.val() || {};
        for (let login in users) {
            if (users[login].role === 'admin' || users[login].role === 'moderator') {
                await addNotification(login, 'new_ticket', 'Новая жалоба', `Пользователь ${currentUserData.name} отправил жалобу: ${topic}`);
            }
        }
    }

    async function getOpenTickets() {
        const snap = await db.ref('tickets').orderByChild('status').equalTo('open').once('value');
        const tickets = [];
        snap.forEach(child => tickets.push(child.val()));
        return tickets.sort((a,b) => b.createdAt - a.createdAt);
    }

    async function getUserTickets() {
        const snap = await db.ref('tickets').once('value');
        const tickets = [];
        snap.forEach(child => {
            const ticket = child.val();
            if (ticket.from === currentUser) tickets.push(ticket);
        });
        return tickets.sort((a,b) => b.createdAt - a.createdAt);
    }

    async function getAllTickets() {
        const snap = await db.ref('tickets').once('value');
        const tickets = [];
        snap.forEach(child => tickets.push(child.val()));
        return tickets.sort((a,b) => b.createdAt - a.createdAt);
    }

    async function respondToTicket(ticketId, response, resolve) {
        const ticketRef = db.ref('tickets/' + ticketId);
        const ticketSnap = await ticketRef.once('value');
        const ticket = ticketSnap.val();
        await ticketRef.update({
            response: response,
            status: resolve ? 'resolved' : 'rejected',
            resolved: resolve,
            resolvedBy: currentUserData.name,
            resolvedAt: new Date().toLocaleString(),
            resolvedAtTimestamp: Date.now()
        });
        if (ticket) {
            await addNotification(ticket.from, 'ticket_response', 'Ответ на жалобу', `${resolve ? '✅ Проблема решена' : '❌ Жалоба отклонена'}: ${response}`);
        }
    }

    // ========== ДОБАВЛЕНИЕ В ИЗБРАННОЕ ==========
    async function addToFavorites(login) {
        let favorites = currentUserData.favorites || [];
        if (!favorites.includes(login) && login !== currentUser) {
            favorites.push(login);
            await db.ref('users/' + currentUser).update({ favorites: favorites });
            currentUserData.favorites = favorites;
            showToast(`⭐ ${login} добавлен в избранное`);
            render();
        }
    }

    // ========== ПЕРЕВОД ==========
    async function transfer(toLogin, amount) {
        if (currentUserData.balance < amount) {
            showToast('Недостаточно средств', true);
            return false;
        }
        if (toLogin === currentUser) {
            showToast('Нельзя перевести самому себе', true);
            return false;
        }
        const receiverSnap = await db.ref('users/' + toLogin).once('value');
        const receiver = receiverSnap.val();
        if (!receiver) {
            showToast('Получатель не найден', true);
            return false;
        }
        const level = calculateLevel(currentUserData.balance);
        const cashback = Math.floor(amount * level.cashback / 100);
        const newFromBalance = currentUserData.balance - amount;
        const newToBalance = (receiver.balance || 0) + amount;
        await db.ref('users/' + currentUser).update({ balance: newFromBalance + cashback });
        await db.ref('users/' + toLogin).update({ balance: newToBalance });
        currentUserData.balance = newFromBalance + cashback;
        await addHistoryEvent('transfer', 'Перевод отправлен', `Вы перевели ${amount.toLocaleString()} ₽ → ${toLogin}`);
        if (cashback > 0) {
            await addHistoryEvent('cashback', 'Кэшбэк', `Вы получили ${cashback} ₽ кэшбэка (${level.cashback}% от перевода)`);
        }
        await addNotification(toLogin, 'transfer_received', 'Получен перевод', `Вы получили ${amount.toLocaleString()} ₽ от ${currentUser}`);
        showToast(`💸 ${amount.toLocaleString()} ₽ → ${toLogin}${cashback > 0 ? ` (кэшбэк +${cashback}₽)` : ''}`);
        render();
        return true;
    }

                        <button onclick="logout()">Выйти</button>
                    </div>
                </div>
                <div class="online-list"><h3>🎮 Онлайн (${onlineUsers.length})</h3>${onlineUsers.map(u => `<div><span class="status-dot"></span> ${u.name}</div>`).join('') || '<div>😴 Никого нет в сети</div>'}</div>
                <div style="margin-bottom:15px">
                    <button class="tab ${currentTab === 'users' ? 'active' : ''}" onclick="switchTab('users')">👥 Пользователи</button>
                    <button class="tab ${currentTab === 'tickets' ? 'active' : ''}" onclick="switchTab('tickets')">📩 Жалобы (${openTickets.length})</button>
                    <button class="tab ${currentTab === 'notifications' ? 'active' : ''}" onclick="switchTab('notifications')">📬 Уведомления ${unreadCount > 0 ? `(${unreadCount})` : ''}</button>
                </div>
                <div id="tabContent"></div>
            </div>
        `;
        const tabContent = document.getElementById('tabContent');
        if (currentTab === 'notifications') {
            tabContent.innerHTML = `<div style="max-height:500px; overflow-y:auto">${notifications.map(n => `<div class="notification-item"><div>${n.title}<br><small>${n.date}</small></div><button onclick="deleteNotification(${n.id})">🗑</button></div>`).join('') || 'Нет уведомлений'}</div>`;
        } else if (currentTab === 'users') {
            tabContent.innerHTML = `<div style="overflow-x:auto"><table style="width:100%"><thead><tr><th>Логин</th><th>Имя</th><th>Баланс</th><th>Роль</th><th>Действия</th></tr></thead><tbody>${usersList.map(u => `<tr><td>${u.login}</td><td>${u.name}</td><td>${(u.balance || 0).toLocaleString()} ₽</td><td><select id="role_${u.login}"><option value="user" ${u.role === 'user' ? 'selected' : ''}>Пользователь</option><option value="moderator" ${u.role === 'moderator' ? 'selected' : ''}>Модератор</option><option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Админ</option></select><button onclick="changeRole('${u.login}')">✅</button></td><td><input type="number" id="amt_${u.login}" style="width:70px"><button onclick="adminGive('${u.login}')">💰</button><input type="password" id="pass_${u.login}" placeholder="пароль" style="width:80px"><button onclick="adminChangePass('${u.login}')">🔑</button><button onclick="adminDelete('${u.login}')" style="background:#dc3545">❌</button></td></tr>`).join('')}</tbody></table></div>`;
        } else {
            tabContent.innerHTML = `<div style="max-height:400px; overflow-y:auto">${openTickets.map(t => `<div class="message-item"><strong>${t.topic}</strong> от ${t.fromName}<br>${t.text}<textarea id="admin_response_${t.id}" rows="2" placeholder="Ответ..." style="width:100%"></textarea><div style="display:flex; gap:10px; margin-top:5px"><button onclick="adminResolveTicket('${t.id}')" style="background:#2e7d32">✅ Исправлено</button><button onclick="adminRejectTicket('${t.id}')" style="background:#dc3545">❌ Отклонить</button></div></div>`).join('') || '<div>Нет обращений</div>'}</div>`;
        }
    }

    // ========== ОБРАБОТЧИКИ ==========
    window.switchTab = function(tab) { currentTab = tab; render(); };
    window.toggleTheme = toggleTheme;
    
    window.login = async function() {
        const login = document.getElementById('login').value.trim();
        const pass = document.getElementById('password').value;
        const msgDiv = document.getElementById('message');
        const snap = await db.ref('users/' + login).once('value');
        const user = snap.val();
        if (user && user.password === pass) {
            currentUser = login;
            saveSession(login);
            await updateOnline();
            currentTab = 'main';
            render();
        } else {
            msgDiv.innerHTML = '<div class="error">❌ Неверный логин или пароль</div>';
        }
    };

    window.showRegister = function() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="card">
                <h1>📝 <span class="logo">DRYLABANK</span></h1>
                <div class="subtitle">Регистрация</div>
                <div id="message"></div>
                <input type="text" id="regLogin" placeholder="Логин">
                <input type="password" id="regPassword" placeholder="Пароль">
                <input type="text" id="regName" placeholder="Имя">
                <button onclick="register()">Зарегистрироваться</button>
                <div style="margin-top:15px; text-align:center">
                    <a onclick="render()" style="color:#b21f1f;cursor:pointer">Уже есть аккаунт? Войти</a>
                </div>
                <div class="cleanup-info">🎁 Стартовый бонус: 10 000 ₽ | Кэшбэк до 3%</div>
            </div>
        `;
    };

    window.register = async function() {
        const login = document.getElementById('regLogin').value.trim();
        const pass = document.getElementById('regPassword').value;
        const name = document.getElementById('regName').value.trim();
        const msgDiv = document.getElementById('message');
        if (!login || !pass) {
            msgDiv.innerHTML = '<div class="error">Заполните поля</div>';
            return;
        }
        const snap = await db.ref('users/' + login).once('value');
        if (snap.exists()) {
            msgDiv.innerHTML = '<div class="error">Логин занят</div>';
            return;
        }
        await db.ref('users/' + login).set({
            login, password: pass, name: name || login,
            balance: 10000, role: "user",
            favorites: [], lastBonus: null,
            goals: [], card: null, activeLoan: null
        });
        await addHistoryEvent('registration', 'Регистрация', `Добро пожаловать в DRYLABANK! Стартовый бонус 10 000 ₽`);
        msgDiv.innerHTML = '<div class="success">✅ Регистрация успешна! Войдите.</div>';
        setTimeout(() => render(), 1500);
    };

    window.submitComplaint = async function() {
        const topic = document.getElementById('topic').value;
        const text = document.getElementById('complaintText').value.trim();
        const msgDiv = document.getElementById('complaintMsg');
        if (!text) {
            msgDiv.innerHTML = '<div class="error">Напишите текст</div>';
            return;
        }
        await sendTicket(topic, text);
        msgDiv.innerHTML = '<div class="success">✅ Жалоба отправлена!</div>';
        document.getElementById('complaintText').value = '';
        setTimeout(() => msgDiv.innerHTML = '', 2000);
        render();
    };

    window.resolveTicket = async function(id) {
        const response = document.getElementById(`response_${id}`).value.trim();
        if (!response) { alert('Напишите ответ'); return; }
        await respondToTicket(id, response, true);
        render();
    };
    window.rejectTicket = async function(id) {
        const response = document.getElementById(`response_${id}`).value.trim();
        if (!response) { alert('Напишите причину'); return; }
        await respondToTicket(id, response, false);
        render();
    };
    window.adminResolveTicket = async function(id) {
        const response = document.getElementById(`admin_response_${id}`).value.trim();
        if (!response) { alert('Напишите ответ'); return; }
        await respondToTicket(id, response, true);
        render();
    };
    window.adminRejectTicket = async function(id) {
        const response = document.getElementById(`admin_response_${id}`).value.trim();
        if (!response) { alert('Напишите причину'); return; }
        await respondToTicket(id, response, false);
        render();
    };

    window.changeMyPassword = async function() {
        const newPass = document.getElementById('newPassword').value.trim();
        if (!newPass) { alert('Введите новый пароль'); return; }
        await db.ref('users/' + currentUser).update({ password: newPass });
        await addHistoryEvent('password_change', 'Смена пароля', 'Вы успешно сменили пароль');
        showToast('🔑 Пароль изменён');
        document.getElementById('newPassword').value = '';
    };

    window.changeRole = async function(login) {
        const newRole = document.getElementById(`role_${login}`).value;
        await db.ref('users/' + login).update({ role: newRole });
        showToast(`✅ Роль ${login} изменена`);
        render();
    };
    window.adminGive = async function(login) {
        const amt = parseFloat(document.getElementById(`amt_${login}`).value);
        if (isNaN(amt) || amt <= 0) { alert('Введите сумму'); return; }
        const snap = await db.ref('users/' + login).once('value');
        const user = snap.val();
        if (user) {
            await db.ref('users/' + login).update({ balance: (user.balance || 0) + amt });
            await addNotification(login, 'admin_give', 'Выдача денег', `Администратор выдал вам ${amt.toLocaleString()} ₽`);
            alert(`✅ Выдано ${amt.toLocaleString()} ₽`);
            render();
        }
    };
    window.adminChangePass = async function(login) {
        const newPass = document.getElementById(`pass_${login}`).value.trim();
        if (!newPass) { alert('Введите пароль'); return; }
        await db.ref('users/' + login).update({ password: newPass });
        alert(`✅ Пароль ${login} изменён`);
        document.getElementById(`pass_${login}`).value = '';
    };
    window.adminDelete = async function(login) {
        if (confirm(`Удалить ${login}?`)) {
            await db.ref('users/' + login).remove();
            await db.ref('notifications/' + login).remove();
            await db.ref('nfts/' + login).remove();
            render();
        }
    };

    window.quickTransfer = function(login) {
        document.getElementById('toUser').value = login;
        showToast(`👤 Получатель: ${login}`);
    };
    window.doTransfer = async function() {
        const toLogin = document.getElementById('toUser').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);
        const msgDiv = document.getElementById('transferMsg');
        if (!toLogin || isNaN(amount) || amount <= 0) {
            msgDiv.innerHTML = '<div class="error">Неверные данные</div>';
            return;
        }
        const success = await transfer(toLogin, amount);
        if (success) {
            msgDiv.innerHTML = '<div class="success">✅ Перевод выполнен!</div>';
            document.getElementById('amount').value = '';
        } else {
            msgDiv.innerHTML = '<div class="error">❌ Ошибка перевода</div>';
        }
        setTimeout(() => msgDiv.innerHTML = '', 2000);
    };

    window.addToFavorites = addToFavorites;
    window.claimDailyBonus = claimDailyBonus;
    window.deleteNotification = deleteNotification;
    window.deleteAllNotifications = deleteAllNotifications;
    window.markNotificationRead = markNotificationRead;
    
    // Функции для новых вкладок
    window.createNewGoal = function() {
        const name = document.getElementById('goalName').value.trim();
        const target = parseFloat(document.getElementById('goalTarget').value);
        if (!name || isNaN(target) || target <= 0) {
            showToast('Введите название и сумму цели', true);
            return;
        }
        createGoal(name, target);
        document.getElementById('goalName').value = '';
        document.getElementById('goalTarget').value = '';
    };
    window.addToGoal = addToGoal;
    window.deleteGoal = deleteGoal;
    window.createVirtualCard = createVirtualCard;
    window.buyNFT = buyNFT;
    window.takeNewLoan = function() {
        const amount = parseFloat(document.getElementById('loanAmount').value);
        const months = parseInt(document.getElementById('loanMonths').value);
        if (isNaN(amount) || amount <= 0) {
            showToast('Введите сумму кредита', true);
            return;
        }
        takeLoan(amount, months);
        document.getElementById('loanAmount').value = '';
    };
    window.repayLoan = repayLoan;

    window.logout = async function() {
        if (currentUser) await db.ref('online/' + currentUser).remove();
        currentUser = null;
        saveSession(null);
        currentTab = 'main';
        render();
    };

    function subscribeToChanges() {
        if (!currentUser) return;
        db.ref('users/' + currentUser).on('value', (snap) => {
            const data = snap.val();
            if (data && currentUser) {
                currentUserData = data;
                render();
            }
        });
        db.ref('notifications/' + currentUser).on('value', () => {
            if (currentUser) render();
        });
        db.ref('nft_catalog').on('value', async () => {
            await loadNFTCatalog();
            if (currentUser) render();
        });
        db.ref('nfts/' + currentUser).on('value', () => {
            if (currentUser) render();
        });
    }

    // ========== ЗАПУСК ==========
    (async () => {
        await initDB();
        restoreSession();
        render();
        scheduleCleanup();
        setInterval(() => { if (currentUser) updateOnline(); }, 15000);
        subscribeToChanges();
    })();
</script>
</body>
</html>
